<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- iOS status bar safe area background -->
  <rect width="180" height="180" fill="#3b82f6" rx="40"/>
  
  <!-- Decorative gradient effect -->
  <defs>
    <linearGradient id="iosGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Left model box -->
  <rect x="20" y="45" width="50" height="80" fill="none" stroke="#ffffff" stroke-width="3" rx="8" opacity="0.95"/>
  <circle cx="33" cy="58" r="4" fill="#ffffff" opacity="0.9"/>
  <circle cx="45" cy="58" r="4" fill="#ffffff" opacity="0.9"/>
  <circle cx="57" cy="58" r="4" fill="#ffffff" opacity="0.9"/>
  <line x1="25" y1="70" x2="65" y2="70" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
  <line x1="25" y1="80" x2="65" y2="80" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
  <line x1="25" y1="90" x2="60" y2="90" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
  <line x1="25" y1="100" x2="55" y2="100" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
  
  <!-- Right model box -->
  <rect x="110" y="45" width="50" height="80" fill="none" stroke="#ffffff" stroke-width="3" rx="8" opacity="0.95"/>
  <circle cx="123" cy="58" r="4" fill="#ffffff" opacity="0.9"/>
  <circle cx="135" cy="58" r="4" fill="#ffffff" opacity="0.9"/>
  <circle cx="147" cy="58" r="4" fill="#ffffff" opacity="0.9"/>
  <line x1="115" y1="70" x2="155" y2="70" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
  <line x1="115" y1="80" x2="155" y2="80" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
  <line x1="115" y1="90" x2="150" y2="90" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
  <line x1="115" y1="100" x2="145" y2="100" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
  
  <!-- Comparison arrows -->
  <path d="M 75 65 L 85 65" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <path d="M 80 60 L 85 65 L 80 70" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  
  <path d="M 95 95 L 85 95" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <path d="M 90 90 L 85 95 L 90 100" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
</svg>