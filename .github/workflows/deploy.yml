name: Build, Test & Deploy LLM Comparator

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [master]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CONTAINER_NAME: llm-comparator
  BUILD_CACHE_KEY: ${{ github.workflow }}-${{ github.ref }}

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate & Quality Checks
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          CI: true

      - name: Check TypeScript
        run: bun run astro check
        continue-on-error: true

      - name: Verify build
        run: bun run build
        env:
          CI: true

  build:
    needs: validate
    runs-on: ubuntu-latest
    name: Build & Push Docker Image
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-,suffix=-${{ github.run_number }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed image digest:${{ steps.build.outputs.digest }}"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to Production
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment:
      name: production
      url: https://llm-comparator.abelgalloruiz.me

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            
            echo "📦 Starting deployment..."
            
            # Authenticate to GitHub Container Registry
            echo '${{ secrets.GHCR_PAT }}' | docker login ghcr.io -u abelrgr --password-stdin
            
            # Define variables
            REGISTRY='${{ env.REGISTRY }}'
            IMAGE_NAME='${{ env.IMAGE_NAME }}'
            CONTAINER_NAME='${{ env.CONTAINER_NAME }}'
            IMAGE_TAG="$REGISTRY/$IMAGE_NAME:latest"
            BACKUP_CONTAINER="${CONTAINER_NAME}-backup-$(date +%s)"
            
            # Create Docker volume for persistent data
            docker volume create ${CONTAINER_NAME}-data || true
            
            echo "🔄 Pulling latest image..."
            if ! docker pull "$IMAGE_TAG"; then
              echo "❌ Failed to pull image"
              exit 1
            fi
            
            echo "💾 Backing up current container..."
            if docker ps -a --format '{{.Names}}' | grep -q "^${CONTAINER_NAME}$"; then
              docker rename "$CONTAINER_NAME" "$BACKUP_CONTAINER"
            fi
            
            echo "🚀 Starting new container..."
            ENV_FILE='${{ secrets.ENV_FILE_PATH }}'
            ENV_FILE_ARG=""
            if [ -n "$ENV_FILE" ] && [ -f "$ENV_FILE" ]; then
              ENV_FILE_ARG="--env-file $ENV_FILE"
            fi

            if ! docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              --health-cmd='wget --quiet --tries=1 --spider http://localhost/ || exit 1' \
              --health-interval=30s \
              --health-timeout=10s \
              --health-retries=3 \
              --health-start-period=40s \
              -v ${CONTAINER_NAME}-data:/var/www/html/tmp \
              -p '${{ secrets.SERVER_PORT }}':80 \
              $ENV_FILE_ARG \
              "$IMAGE_TAG"; then
              echo "❌ Failed to start new container"
              echo "📋 Container logs:"
              docker logs "$CONTAINER_NAME" 2>&1 || true

              # Rollback: restore backup
              if [ ! -z "$BACKUP_CONTAINER" ]; then
                docker rename "$BACKUP_CONTAINER" "$CONTAINER_NAME"
                docker start "$CONTAINER_NAME"
                echo "⚠️  Rolled back to previous version"
              fi
              exit 1
            fi
            
            echo "🔍 Waiting for container health check..."
            sleep 5
            
            # Check container health
            HEALTH_STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$CONTAINER_NAME" 2>/dev/null || echo "none")
            
            if [ "$HEALTH_STATUS" = "healthy" ] || docker ps | grep -q "$CONTAINER_NAME"; then
              echo "✅ Container is running"
              
              # Cleanup backup container
              if [ ! -z "$BACKUP_CONTAINER" ] && docker ps -a --format '{{.Names}}' | grep -q "^${BACKUP_CONTAINER}$"; then
                docker rm -f "$BACKUP_CONTAINER"
                echo "🧹 Cleaned up backup container"
              fi
              
              # Show deployment info
              echo ""
              echo "📊 Deployment Info:"
              docker inspect "$CONTAINER_NAME" | grep -E '"Image"|"Name"'
              docker exec "$CONTAINER_NAME" nginx -v 2>&1 || true
              echo "✨ Deployment completed successfully!"
            else
              echo "❌ Container health check failed"
              
              if [ ! -z "$BACKUP_CONTAINER" ]; then
                docker rename "$BACKUP_CONTAINER" "$CONTAINER_NAME"
                docker start "$CONTAINER_NAME"
                echo "⚠️  Rolled back to previous version"
              fi
              exit 1
            fi

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            CONTAINER_NAME='${{ env.CONTAINER_NAME }}'
            echo "🔗 Testing connectivity..."
            
            # Check if container is still running
            if docker ps --format '{{.Names}}' | grep -q "^${CONTAINER_NAME}$"; then
              echo "✅ Container is running"
              docker stats --no-stream "$CONTAINER_NAME" | head -2
            else
              echo "❌ Container is not running"
              exit 1
            fi

      - name: Deployment notification
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployment to production succeeded"
            echo "🌐 Check: https://llm-comparator.abelgalloruiz.me"
          else
            echo "❌ Deployment to production failed"
          fi

  cleanup:
    needs: deploy
    runs-on: ubuntu-latest
    name: Cleanup Old Images
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    continue-on-error: true

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete untagged images
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            console.log(`🧹 Cleaning up old images for ${owner}/${repo}`);
            
            const response = await github.rest.packages.getAllPackageVersionsForPackageOwnedByAuthenticatedUser({
              package_type: 'container',
              package_name: repo,
            });
            
            const versionsToDelete = response.data
              .filter(v => v.name.includes('sha-'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
              .slice(5); // Keep last 5 versions
            
            for (const version of versionsToDelete) {
              console.log(`Deleting version: ${version.name}`);
              await github.rest.packages.deletePackageVersionForAuthenticatedUser({
                package_type: 'container',
                package_name: repo,
                package_version_id: version.id,
              });
            }
            
            console.log(`✅ Cleanup completed`)
          